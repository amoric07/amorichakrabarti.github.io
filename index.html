<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amori Chakrabarti | Resume</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root {
    --black: #0a0a0a;
    --white: #ffffff;
    --blue: #bcdcff;
    --gray: #777;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Oswald', sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: var(--white);
    color: var(--black);
}

/* Container */

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 20px;
}

/* Header */

.header {
    border-bottom: 1px solid var(--black);
    padding-bottom: 20px;
    margin-bottom: 40px;
}

.header h1 {
    font-size: 40px;
    letter-spacing: 3px;
}

.header p {
    font-size: 14px;
    color: var(--gray);
    margin-top: 10px;
}

/* Accent line */

.accent {
    width: 60px;
    height: 3px;
    background: var(--blue);
    margin-top: 12px;
}

/* Sections */

.section {
    margin-bottom: 40px;
}

.section h2 {
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.section p {
    font-size: 14px;
    margin-bottom: 8px;
}

ul {
    list-style: none;
    padding-left: 0;
}

li {
    font-size: 14px;
    margin-bottom: 6px;
}

/* Grid */

.grid {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
}

.grid div {
    flex: 1;
    min-width: 250px;
}

/* Items */

.item {
    margin-bottom: 12px;
}

.item span {
    display: block;
    font-size: 13px;
    color: var(--gray);
}

/* Subtle hover detail */

.section:hover h2 {
    color: var(--blue);
    transition: 0.3s;
}

/* Back to top button */

.top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--black);
    color: var(--white);
    padding: 10px 14px;
    text-decoration: none;
    font-size: 13px;
    border-radius: 3px;
}

.top-btn:hover {
    background: var(--blue);
    color: var(--black);
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>AMORI CHAKRABARTI</h1>
        <p>Architecture Student</p>
        <div class="accent"></div>
    </div>

    <div class="section">
        <h2>EDUCATION</h2>
        <div class="accent"></div>
        <div class="item">
            IIMB BBA DBE
            <span>2025 – 2028</span>
        </div>
    </div>

    <div class="section">
        <h2>SKILLS</h2>
        <div class="accent"></div>
        <ul>
            <li>Design Thinking</li>
            <li>Spatial Planning</li>
            <li>Visual Composition</li>
        </ul>
    </div>

    <div class="section">
        <h2>INTERESTS</h2>
        <div class="accent"></div>
        <ul>
            <li>Architecture & Built Form</li>
            <li>Material Exploration</li>
            <li>Minimal Design Systems</li>
        </ul>
    </div>

</div>

<a href="#" class="top-btn">TOP</a>

</body>
</html>
